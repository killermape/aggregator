name: Daily Aggregator Update

on:
  schedule:
    # UTC 时间的 22:00，相当于北京时间每天早上 6:00
    - cron: '0 22 * * *'
  workflow_dispatch: # 保留手动触发按钮

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # 匹配原项目环境

    - name: Install dependencies
      run: |
        pip install --no-cache-dir -r requirements.txt

    - name: Run Aggregator
      env:
        # 将你在第 3 步设置的 Secret 映射到环境变量中
        GIST_PAT: ${{ secrets.GIST_PAT }} 
      run: |
        python -u subscribe/process.py
